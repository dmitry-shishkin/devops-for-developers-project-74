services:
  app:
    image: dmitryshishkin/devops-for-developers-project-74:latest
    build:
      context: .
      dockerfile: Dockerfile.production
    command: make test
    ports:
      - "8080:8080"
    depends_on:
      - db

  db:
    image: postgres:18.3-alpine3.23
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
